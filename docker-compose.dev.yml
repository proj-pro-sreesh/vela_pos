version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: vela-pos-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: vela-pos-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/vela-pos
      - JWT_SECRET=vela-pos-secret-key-2024
      - CLIENT_URL=http://localhost:5173
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules

  # Frontend Client (development mode with hot reload)
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: vela-pos-client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongodb_data:
